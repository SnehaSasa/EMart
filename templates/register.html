<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    
    <style>
        body {
            font-family: 'Poppins', Arial, sans-serif;
            background-image: url('../static/landing-page/images/bg3.jpeg'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login {
            background: rgba(255, 255, 255, 0.15);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            width: 400px;
            text-align: center;
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .input-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            text-align: left;
            position: relative;
        }

        .input-group label {
            width: 100px;
            font-weight: bold;
            text-align: left;
            margin: 20px;
            color: black;
        }

        .input-group input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease-in-out;
            background: rgba(255, 255, 255, 0.8); 
            color: #333; 
        }

        .input-group input:focus {
            border-color: #28a745;
            box-shadow: 0 0 5px rgba(40, 167, 69, 0.4);
        }

        .login button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease-in-out;
            margin-top: 10px;
        }

        .login button:hover {
            background: linear-gradient(135deg, #0056b3, #004494);
            transform: scale(1.05);
        }

        .extra-links {
            margin-top: 20px;
            font-size: 14px;
        }

        .extra-links a {
            text-decoration: none;
            color: #fff; /* White links for contrast */
            font-weight: 500;
            transition: color 0.3s ease-in-out;
            margin: 0 5px;
        }

        .extra-links a:hover {
            color: #ffcc00;
        }

        /* Styling for error messages */
        .error-message {
            color: red;
            font-size: 12px;
            position: absolute;
            bottom: -18px;
            left: 0;
            margin-left: 5px;
        }
    </style> 
    
</head>
<body>
    <div class="login">
        <h2 style="margin-top:5px; color: black">Sign in to your account</h2><br>
        <!-- {% if message %}
            <p style="color: red; font-size: 14px;">{{ message | safe }}</p>
        {% endif %} -->
        <form id="loginForm" action="/register" method="post">
            <div class="input-group">
                <label for="email">E-mail:</label>
                <input type="text" id="email" name="email" placeholder="Enter your email" required>
                <!-- <div class="error-message" id="emailError"></div> -->
            </div>
            <div class="input-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
                <!-- <div class="error-message" id="passwordError"></div> -->
            </div>
            {% if message %}
                <p style="color: red; font-size: 14px;">{{ message | safe }}</p>
            {% endif %}
            <button type="submit">Login</button>
        </form>
        <div class="extra-links">
            <p><a href="#">Forgot Password?</a> | <a href="/create">Create an Account</a></p>
        </div>
    </div>
